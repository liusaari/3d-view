<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #video {
      position: fixed; top: 12px; right: 12px;
      width: 140px; border-radius: 8px; opacity: 0.4;
      transform: scaleX(-1); z-index: 10;
    }
    #status {
      position: fixed; top: 12px; left: 12px;
      color: #0f0; font-size: 13px; z-index: 10;
      text-shadow: 0 0 8px #0f0;
    }
    #hint {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: #444; font-size: 13px; z-index: 10;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="status">Requesting camera...</div>
  <div id="hint">Move your head — look around the box</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>

  <script>
    // ── Scene ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog   = new THREE.FogExp2(0x000000, 0.018);

    const cam = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 300);
    cam.position.set(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // ── Build the box tunnel ─────────────────────────────────────────────────
    // A series of rectangular frames at increasing depths, connected at corners.
    // This gives the "looking into a box" perspective-line feel.

    const W = 10, H = 7;          // frame width / height
    const depths = [];
    for (let z = -2; z >= -80; z -= 5) depths.push(z);

    const frameMat  = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.7 });
    const connMat   = new THREE.LineBasicMaterial({ color: 0x005544, transparent: true, opacity: 0.5 });
    const accentMat = new THREE.LineBasicMaterial({ color: 0x0044ff, transparent: true, opacity: 0.4 });

    // Helper: line between two [x,y,z] points
    function line3(a, b, mat) {
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(...a), new THREE.Vector3(...b)
      ]);
      return new THREE.Line(geo, mat);
    }

    // Helper: rectangular frame at depth z
    function addFrame(z, mat) {
      const hw = W / 2, hh = H / 2;
      const corners = [[-hw,-hh,z],[hw,-hh,z],[hw,hh,z],[-hw,hh,z],[-hw,-hh,z]];
      const geo = new THREE.BufferGeometry().setFromPoints(
        corners.map(p => new THREE.Vector3(...p))
      );
      scene.add(new THREE.Line(geo, mat));
      return [[-hw,-hh,z],[hw,-hh,z],[hw,hh,z],[-hw,hh,z]];
    }

    // Add cross-dividers inside each frame (grid lines on face)
    function addDividers(z, mat) {
      const hw = W / 2, hh = H / 2;
      const cols = 4, rows = 3;
      for (let i = 1; i < cols; i++) {
        const x = -hw + (W / cols) * i;
        scene.add(line3([x, -hh, z], [x, hh, z], mat));
      }
      for (let i = 1; i < rows; i++) {
        const y = -hh + (H / rows) * i;
        scene.add(line3([-hw, y, z], [hw, y, z], mat));
      }
    }

    // Build frames + connector lines
    let prevCorners = null;
    depths.forEach((z, i) => {
      const isAccent = i % 3 === 0;
      const corners = addFrame(z, isAccent ? frameMat : accentMat);
      addDividers(z, connMat);

      if (prevCorners) {
        for (let c = 0; c < 4; c++) {
          scene.add(line3(prevCorners[c], corners[c], connMat));
        }
      }
      prevCorners = corners;
    });

    // Floor and ceiling grid lines running into the depth
    const hw = W / 2, hh = H / 2;
    const zNear = -2, zFar = -80;
    const floorCols = 5;
    for (let i = 0; i <= floorCols; i++) {
      const x = -hw + (W / floorCols) * i;
      scene.add(line3([x, -hh, zNear], [x, -hh, zFar], connMat));
      scene.add(line3([x,  hh, zNear], [x,  hh, zFar], connMat));
    }
    const sideRows = 4;
    for (let i = 0; i <= sideRows; i++) {
      const y = -hh + (H / sideRows) * i;
      scene.add(line3([-hw, y, zNear], [-hw, y, zFar], connMat));
      scene.add(line3([ hw, y, zNear], [ hw, y, zFar], connMat));
    }

    // ── Head tracking ─────────────────────────────────────────────────────────
    let camX = 0, camY = 0;   // applied directly — no lag

    const videoEl  = document.getElementById('video');
    const statusEl = document.getElementById('status');

    const faceDetector = new FaceDetection({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${f}`
    });
    faceDetector.setOptions({ model: 'short', minDetectionConfidence: 0.5 });

    faceDetector.onResults(results => {
      if (results.detections.length > 0) {
        const box = results.detections[0].boundingBox;
        // Flip X because selfie camera is mirrored
        camX = (box.xCenter - 0.5) * -6;
        camY = (box.yCenter - 0.5) * -4;
        statusEl.textContent = '● Tracking';
      } else {
        statusEl.textContent = '○ No face detected';
      }
    });

    const mpCam = new Camera(videoEl, {
      onFrame: async () => { await faceDetector.send({ image: videoEl }); },
      width: 320, height: 240   // lower res = faster detection = less lag
    });
    mpCam.start()
      .then(() => { statusEl.textContent = '○ Looking for face...'; })
      .catch(err => { statusEl.textContent = 'Camera error: ' + err.message; });

    // ── Render loop ──────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Direct assignment — no smoothing, no lag
      cam.position.x = camX;
      cam.position.y = camY;
      cam.position.z = 0;
      cam.lookAt(0, 0, -40);   // always look toward the back of the box

      renderer.render(scene, cam);
    }
    animate();

    window.addEventListener('resize', () => {
      cam.aspect = innerWidth / innerHeight;
      cam.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
