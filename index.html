<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; color: #fff; }
    canvas { display: block; }

    #video {
      position: fixed; top: 12px; right: 12px;
      width: 120px; border-radius: 8px; opacity: 0.3;
      transform: scaleX(-1); z-index: 10;
    }
    #status {
      position: fixed; top: 12px; left: 12px;
      color: #0f0; font-size: 11px; z-index: 10;
      text-shadow: 0 0 6px #0f0;
    }

    /* ── Crosshair ── */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 36px; height: 36px;
      border: 1.5px solid rgba(0,255,200,0.85);
      border-radius: 50%;
      pointer-events: none; z-index: 100;
      box-shadow: 0 0 10px #00ffcc, inset 0 0 6px rgba(0,255,200,0.2);
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    #crosshair::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 4px; height: 4px; background: #00ffcc;
      border-radius: 50%; transform: translate(-50%, -50%);
      box-shadow: 0 0 8px #00ffcc;
    }
    /* tick marks */
    #crosshair::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 50px; height: 50px;
      transform: translate(-50%, -50%);
      background:
        linear-gradient(#00ffcc,#00ffcc) center top    / 1.5px 7px,
        linear-gradient(#00ffcc,#00ffcc) center bottom / 1.5px 7px,
        linear-gradient(#00ffcc,#00ffcc) left   center / 7px 1.5px,
        linear-gradient(#00ffcc,#00ffcc) right  center / 7px 1.5px;
      background-repeat: no-repeat;
      opacity: 0.6;
    }
    #crosshair.hit {
      border-color: #fff;
      box-shadow: 0 0 20px #fff, 0 0 40px #00ffcc, inset 0 0 10px rgba(255,255,255,0.5);
    }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 50; pointer-events: none;
    }
    #score-label { font-size: 10px; color: #555; letter-spacing: 2px; margin-bottom: 2px; }
    #score { font-size: 28px; color: #00ffcc; text-shadow: 0 0 12px #00ffcc; letter-spacing: 3px; }
    #lives { font-size: 20px; letter-spacing: 4px; }
    #combo {
      position: fixed; top: 80px; left: 50%;
      transform: translateX(-50%);
      font-size: 22px; color: #ffcc00;
      text-shadow: 0 0 12px #ffcc00;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 50;
    }

    /* ── Flash overlay ── */
    #flash {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
      opacity: 0; background: #ff0033;
      transition: opacity 0.05s;
    }

    /* ── Game over ── */
    #gameover {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 18px;
    }
    #gameover.show { display: flex; }
    #gameover h1 { font-size: 48px; color: #ff3300; text-shadow: 0 0 30px #ff3300; letter-spacing: 8px; }
    #gameover .sub { font-size: 13px; color: #888; letter-spacing: 2px; }
    #final-score { font-size: 36px; color: #00ffcc; text-shadow: 0 0 16px #00ffcc; }
    #restart-btn {
      margin-top: 10px; padding: 12px 32px;
      background: transparent; border: 1.5px solid #00ffcc;
      color: #00ffcc; font-family: monospace; font-size: 14px;
      letter-spacing: 3px; cursor: pointer;
      text-shadow: 0 0 8px #00ffcc; box-shadow: 0 0 12px rgba(0,255,200,0.3);
      transition: background 0.2s;
    }
    #restart-btn:hover { background: rgba(0,255,200,0.12); }

    /* ── Settings ── */
    #settings-btn {
      position: fixed; bottom: 20px; right: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 17px; cursor: pointer;
      z-index: 20; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    #settings-btn:hover { background: rgba(255,255,255,0.15); }
    #settings {
      position: fixed; right: -290px; top: 0; bottom: 0;
      width: 260px; padding: 22px 18px;
      background: rgba(0,0,0,0.9);
      border-left: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      z-index: 15; overflow-y: auto;
      transition: right 0.3s cubic-bezier(.4,0,.2,1);
    }
    #settings.open { right: 0; }
    #settings h2 { font-size: 10px; color: #0f0; margin-bottom: 20px; letter-spacing: 3px; }
    .section-title {
      font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase;
      border-top: 1px solid #1a1a1a; padding-top: 12px; margin: 16px 0 10px;
    }
    .setting { margin-bottom: 14px; }
    .setting label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 6px; }
    .setting label span { color: #0f0; }
    input[type=range] {
      width: 100%; height: 2px; appearance: none;
      background: #222; border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #0f0; cursor: pointer;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="status">Requesting camera...</div>

  <div id="crosshair"></div>

  <div id="hud">
    <div>
      <div id="score-label">SCORE</div>
      <div id="score">0</div>
    </div>
    <div id="lives">♥ ♥ ♥</div>
  </div>
  <div id="combo"></div>
  <div id="flash"></div>

  <div id="gameover">
    <h1>GAME OVER</h1>
    <div class="sub">FINAL SCORE</div>
    <div id="final-score">0</div>
    <button id="restart-btn">PLAY AGAIN</button>
  </div>

  <button id="settings-btn">⚙</button>
  <div id="settings">
    <h2>⚙ SETTINGS</h2>
    <div class="section-title">Head Tracking</div>
    <div class="setting">
      <label>Horizontal sensitivity <span id="hSensVal">5</span></label>
      <input type="range" id="hSens" min="1" max="12" step="0.5" value="5">
    </div>
    <div class="setting">
      <label>Vertical sensitivity <span id="vSensVal">3.5</span></label>
      <input type="range" id="vSens" min="1" max="8" step="0.5" value="3.5">
    </div>
    <div class="setting">
      <label>Smoothing <span id="smoothVal">0.09</span></label>
      <input type="range" id="smooth" min="0.03" max="0.4" step="0.01" value="0.09">
    </div>
    <div class="section-title">Scene</div>
    <div class="setting">
      <label>Field of view <span id="fovVal">70</span></label>
      <input type="range" id="fov" min="40" max="110" step="1" value="70">
    </div>
    <div class="setting">
      <label>Fog density <span id="fogVal">0.018</span></label>
      <input type="range" id="fog" min="0" max="0.07" step="0.001" value="0.018">
    </div>
    <div class="section-title">Game</div>
    <div class="setting">
      <label>Target speed <span id="speedVal">10</span></label>
      <input type="range" id="speed" min="3" max="30" step="1" value="10">
    </div>
    <div class="setting">
      <label>Spawn rate (s) <span id="spawnVal">1.6</span></label>
      <input type="range" id="spawn" min="0.4" max="4" step="0.1" value="1.6">
    </div>
    <div class="setting">
      <label>Hit radius <span id="hitRVal">1.0</span></label>
      <input type="range" id="hitR" min="0.3" max="2.5" step="0.1" value="1.0">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>

  <script>
    // ── Settings ──────────────────────────────────────────────────────────────
    const S = { hSens:5, vSens:3.5, smooth:0.09, fov:70, fog:0.018, speed:10, spawn:1.6, hitR:1.0 };

    document.getElementById('settings-btn').addEventListener('click', () =>
      document.getElementById('settings').classList.toggle('open')
    );
    function bind(id, key, valId, cb) {
      document.getElementById(id).addEventListener('input', e => {
        S[key] = parseFloat(e.target.value);
        document.getElementById(valId).textContent = e.target.value;
        cb && cb(S[key]);
      });
    }

    // ── Scene ─────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, S.fog);

    const cam = new THREE.PerspectiveCamera(S.fov, innerWidth / innerHeight, 0.1, 300);
    cam.position.set(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    // ── Tunnel ────────────────────────────────────────────────────────────────
    const W = 10, H = 7;
    const depths = Array.from({ length: 20 }, (_, i) => -2 - i * 5);
    const cyanMat = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5 });
    const dimMat  = new THREE.LineBasicMaterial({ color: 0x003a2a, transparent: true, opacity: 0.6 });
    const blueMat = new THREE.LineBasicMaterial({ color: 0x112266, transparent: true, opacity: 0.4 });

    function seg(a, b, mat) {
      return new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a), new THREE.Vector3(...b)]),
        mat
      );
    }
    function addFrame(z, mat) {
      const hw = W/2, hh = H/2;
      const pts = [[-hw,-hh,z],[hw,-hh,z],[hw,hh,z],[-hw,hh,z],[-hw,-hh,z]];
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts.map(p => new THREE.Vector3(...p))), mat
      ));
      return [[-hw,-hh,z],[hw,-hh,z],[hw,hh,z],[-hw,hh,z]];
    }
    function addDividers(z, mat) {
      const hw = W/2, hh = H/2;
      for (let i = 1; i < 4; i++) { const x = -hw+(W/4)*i; scene.add(seg([x,-hh,z],[x,hh,z],mat)); }
      for (let i = 1; i < 3; i++) { const y = -hh+(H/3)*i; scene.add(seg([-hw,y,z],[hw,y,z],mat)); }
    }
    let prev = null;
    depths.forEach((z, i) => {
      const corners = addFrame(z, i % 3 === 0 ? cyanMat : blueMat);
      addDividers(z, dimMat);
      if (prev) for (let c = 0; c < 4; c++) scene.add(seg(prev[c], corners[c], dimMat));
      prev = corners;
    });
    const hw = W/2, hh = H/2, zN = -2, zF = depths.at(-1);
    for (let i = 0; i <= 4; i++) { const x = -hw+(W/4)*i; scene.add(seg([x,-hh,zN],[x,-hh,zF],dimMat)); scene.add(seg([x,hh,zN],[x,hh,zF],dimMat)); }
    for (let i = 0; i <= 3; i++) { const y = -hh+(H/3)*i; scene.add(seg([-hw,y,zN],[-hw,y,zF],dimMat)); scene.add(seg([hw,y,zN],[hw,y,zF],dimMat)); }

    // ── Stars ─────────────────────────────────────────────────────────────────
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(500 * 3);
    for (let i = 0; i < 500; i++) {
      starPos[i*3]   = (Math.random()-0.5)*55;
      starPos[i*3+1] = (Math.random()-0.5)*38;
      starPos[i*3+2] = -Math.random()*95 - 2;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.07 })));

    // ── Lighting ──────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    [[0x00ffcc,60,[ 4, 2,-10]], [0x7700ff,60,[-4,-2,-15]], [0xff0055,50,[0,3,-20]]].forEach(([c,i,p]) => {
      const l = new THREE.PointLight(c, i, 40); l.position.set(...p); scene.add(l);
    });

    // ── Game state ────────────────────────────────────────────────────────────
    const SPAWN_Z  = -85;
    const KILL_Z   =  2;   // object passes camera → lose life

    const geoPool = [
      new THREE.BoxGeometry(0.9, 0.9, 0.9),
      new THREE.TetrahedronGeometry(0.85),
      new THREE.OctahedronGeometry(0.75),
      new THREE.IcosahedronGeometry(0.75),
      new THREE.DodecahedronGeometry(0.7),
    ];
    const palette = [0xff3300, 0x00ccff, 0xffcc00, 0xff00aa, 0x00ff88, 0xff6600, 0xaa00ff];

    let targets   = [];   // { mesh, wire, x, y, speed, value }
    let dying     = [];   // { mesh, wire, age } — hit objects fading out
    let score     = 0;
    let lives     = 3;
    let combo     = 0;
    let comboTimer = 0;
    let lastSpawn  = 0;
    let gameActive = true;

    const scoreEl  = document.getElementById('score');
    const livesEl  = document.getElementById('lives');
    const comboEl  = document.getElementById('combo');
    const flashEl  = document.getElementById('flash');
    const gameoverEl = document.getElementById('gameover');
    const finalEl  = document.getElementById('final-score');
    const crossEl  = document.getElementById('crosshair');

    function heartsStr(n) { return Array.from({length:3},(_, i)=> i<n ? '♥' : '♡').join(' '); }

    function spawnTarget() {
      const geo   = geoPool[Math.floor(Math.random() * geoPool.length)];
      const color = palette[Math.floor(Math.random() * palette.length)];
      const mat   = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.4, shininess: 80 });
      const mesh  = new THREE.Mesh(geo, mat);

      // Random position reachable by head movement (camX ~ ±3, camY ~ ±2)
      const tx = (Math.random()-0.5) * 5.5;
      const ty = (Math.random()-0.5) * 3.5;
      mesh.position.set(tx, ty, SPAWN_Z);

      // Glowing wireframe outline
      const wire = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
      );
      mesh.add(wire);

      scene.add(mesh);
      targets.push({ mesh, x: tx, y: ty, speed: S.speed + (score/100)*3 });
    }

    function flashScreen(color) {
      flashEl.style.background = color;
      flashEl.style.opacity = '0.45';
      setTimeout(() => { flashEl.style.opacity = '0'; }, 80);
    }

    function showCombo(n) {
      if (n < 2) return;
      comboEl.textContent = `${n}x COMBO!`;
      comboEl.style.opacity = '1';
      clearTimeout(comboEl._t);
      comboEl._t = setTimeout(() => { comboEl.style.opacity = '0'; }, 900);
    }

    function loseLife() {
      lives = Math.max(0, lives - 1);
      livesEl.textContent = heartsStr(lives);
      flashScreen('#ff0033');
      combo = 0;
      if (lives === 0) endGame();
    }

    function endGame() {
      gameActive = false;
      finalEl.textContent = score;
      gameoverEl.classList.add('show');
    }

    function restart() {
      targets.forEach(t => scene.remove(t.mesh));
      dying.forEach(d => scene.remove(d.mesh));
      targets = []; dying = [];
      score = 0; lives = 3; combo = 0; lastSpawn = 0;
      scoreEl.textContent = '0';
      livesEl.textContent = heartsStr(3);
      gameoverEl.classList.remove('show');
      gameActive = true;
    }
    document.getElementById('restart-btn').addEventListener('click', restart);

    // ── Head tracking ─────────────────────────────────────────────────────────
    let targetX = 0, targetY = 0, targetZ = 0;
    let camX = 0, camY = 0, camZ = 0;
    let refSize = null;

    const videoEl  = document.getElementById('video');
    const statusEl = document.getElementById('status');

    const faceDetector = new FaceDetection({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${f}`
    });
    faceDetector.setOptions({ model: 'short', minDetectionConfidence: 0.5 });

    faceDetector.onResults(results => {
      if (results.detections.length > 0) {
        const box = results.detections[0].boundingBox;
        if (refSize === null) refSize = box.width;
        targetX = (box.xCenter - 0.5) * -S.hSens;
        targetY = (box.yCenter - 0.5) * -S.vSens;
        targetZ = (box.width - refSize) * -25;
        statusEl.textContent = '● Tracking';
      } else {
        statusEl.textContent = '○ No face detected';
      }
    });

    const mpCam = new Camera(videoEl, {
      onFrame: async () => { await faceDetector.send({ image: videoEl }); },
      width: 320, height: 240
    });
    mpCam.start()
      .then(() => { statusEl.textContent = '○ Looking for face...'; })
      .catch(err => { statusEl.textContent = 'Camera error: ' + err.message; });

    // ── Settings wiring ───────────────────────────────────────────────────────
    bind('hSens',  'hSens',  'hSensVal');
    bind('vSens',  'vSens',  'vSensVal');
    bind('smooth', 'smooth', 'smoothVal');
    bind('fov',    'fov',    'fovVal',  v => { cam.fov = v; cam.updateProjectionMatrix(); });
    bind('fog',    'fog',    'fogVal',  v => { scene.fog.density = v; });
    bind('speed',  'speed',  'speedVal');
    bind('spawn',  'spawn',  'spawnVal');
    bind('hitR',   'hitR',   'hitRVal');

    // ── Render loop ───────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const t  = clock.elapsedTime;

      // Smooth camera from head tracking
      camX += (targetX - camX) * S.smooth;
      camY += (targetY - camY) * S.smooth;
      camZ += (targetZ - camZ) * S.smooth;
      cam.position.set(camX, camY, camZ);
      cam.lookAt(0, 0, -999);

      if (gameActive) {
        // Spawn
        lastSpawn += dt;
        if (lastSpawn >= S.spawn) {
          spawnTarget();
          lastSpawn = 0;
        }

        // Combo timer
        comboTimer -= dt;
        if (comboTimer < 0) combo = 0;

        // Move targets + hit detection
        for (let i = targets.length - 1; i >= 0; i--) {
          const tgt = targets[i];
          tgt.mesh.position.z += tgt.speed * dt;
          tgt.mesh.rotation.x += dt * 0.9;
          tgt.mesh.rotation.y += dt * 1.1;

          // Pulse brightness as it approaches
          const proximity = 1 - Math.min(1, Math.abs(tgt.mesh.position.z) / 60);
          tgt.mesh.material.emissiveIntensity = 0.3 + proximity * 0.8;

          // Hit detection: crosshair (camX, camY) vs target world XY
          const dx = camX - tgt.x;
          const dy = camY - tgt.y;
          const dist = Math.sqrt(dx*dx + dy*dy);

          if (dist < S.hitR) {
            // HIT
            combo++;
            comboTimer = 1.5;
            const pts = 10 * combo;
            score += pts;
            scoreEl.textContent = score;
            showCombo(combo);
            flashScreen('#00ffcc');

            // Crosshair flash
            crossEl.classList.add('hit');
            setTimeout(() => crossEl.classList.remove('hit'), 150);

            // Move to dying list (scale up + fade)
            dying.push({ mesh: tgt.mesh, age: 0 });
            targets.splice(i, 1);

          } else if (tgt.mesh.position.z > KILL_Z) {
            // MISSED — passed the camera
            scene.remove(tgt.mesh);
            targets.splice(i, 1);
            loseLife();
          }
        }

        // Animate dying objects
        for (let i = dying.length - 1; i >= 0; i--) {
          const d = dying[i];
          d.age += dt;
          const s = 1 + d.age * 6;
          d.mesh.scale.set(s, s, s);
          d.mesh.material.opacity = Math.max(0, 1 - d.age * 4);
          d.mesh.material.transparent = true;
          if (d.age > 0.35) {
            scene.remove(d.mesh);
            dying.splice(i, 1);
          }
        }
      }

      renderer.render(scene, cam);
    }
    animate();

    window.addEventListener('resize', () => {
      cam.aspect = innerWidth / innerHeight;
      cam.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
